name: Create Module Files For GitHub Release

on:
  release:
    types: [published]
  workflow_dispatch: # 允许手动测试运行

# 全局环境变量只保留通用的，不保留依赖 release 信息的
env:
  project_url: "https://github.com/${{github.repository}}"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 1. 提取版本号
      - name: Extract Version From Tag
        id: get_version
        uses: battila7/get-version-action@v2

      # 2. 修改 module.json
      # 注意：我们将 release 相关的 URL 定义移动到了这里，并加了 fallback 处理
      - name: Modify Module Manifest With Release-Specific Values
        id: sub_manifest_link_version
        uses: cschleiden/replace-tokens@v1
        with:
          files: 'module.json'
        env:
          # 如果是 Release 触发，使用 Tag 里的版本；如果是手动触发，使用 '0.0.0' 或 git 里的版本
          VERSION: ${{ steps.get_version.outputs.version-without-v || '0.0.0' }}
          URL: ${{ env.project_url }}
          # 动态构建 URL，防止手动运行时因为没有 release 导致队列崩溃
          MANIFEST: "https://github.com/${{github.repository}}/releases/latest/download/module.json"
          DOWNLOAD: "https://github.com/${{github.repository}}/releases/download/${{ github.event.release.tag_name || 'v0.0.0' }}/module.zip"

      # 3. 创建 ZIP 包
      - name: Create Module Archive
        run: |
          zip                        \
            --recurse-paths          \
            ./module.zip             \
            module.json              \
            README.md                \
            pf2e-smart-action-icons.js        \
            lang/

      # 4. 上传到 Release
      # 注意：手动运行时这一步会跳过，因为没有 Release 可以上传
      - name: Update Release With Files
        id: create_version_release
        if: github.event_name == 'release'  # 关键：只有真正的 Release 事件才执行上传
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: ${{ github.event.release.unpublished }}
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json, ./module.zip'
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}